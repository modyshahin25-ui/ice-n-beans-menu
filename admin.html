<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم المنيو - Ice N Beans</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f4; direction: rtl; }
        .form-container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #d4af37; color: black; font-weight: bold; cursor: pointer; }
        .item-list { margin-top: 20px; }
        .admin-item { background: #eee; padding: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>إضافة صنف جديد</h2>
    <input type="text" id="itemName" placeholder="اسم المشروب">
    <select id="itemCategory">
        <option value="HOT DRINKS">HOT DRINKS</option>
        <option value="COLD DRINKS">COLD DRINKS</option>
        <option value="FRAPPE">FRAPPE</option>
        <option value="SMOOTHIES">SMOOTHIES</option>
        <option value="MILKSHAKES">MILKSHAKES</option>
    </select>
    <input type="number" id="priceSmall" placeholder="السعر الصغير">
    <input type="number" id="priceLarge" placeholder="السعر الكبير">
    <button onclick="addItem()">إضافة للمنيو</button>
</div>

<div class="form-container item-list" id="currentItems">
    <h2>الأصناف الحالية</h2>
    </div>

<script src="admin.js"></script>
</body>
</html>
