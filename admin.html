<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم - Ice N Beans</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f5; --card: #ffffff; --border: #e4e7ec; --text: #1a1d23;
      --muted: #6b7280; --accent: #1a1d23; --danger: #ef4444; --success: #22c55e;
      --info-bg: #eff6ff; --info-text: #1d4ed8; --radius: 14px; --radius-sm: 8px;
    }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; direction: rtl; }

    /* ===== LOGIN ===== */
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1d23 0%, #2d3748 100%); }
    .login-card { background: var(--card); border-radius: var(--radius); padding: 2.5rem 2rem; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-logo { width: 64px; height: 64px; border-radius: 50%; background: #1a1d23; color: white; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; margin: 0 auto 1.5rem; letter-spacing: 1px; }
    .login-card h2 { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .login-subtitle { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .field input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: 'Cairo', sans-serif; color: var(--text); background: #f9fafb; transition: border-color 0.2s; }
    .field input:focus { outline: none; border-color: var(--accent); background: white; }
    .login-btn { width: 100%; padding: 12px; background: #1a1d23; color: white; border: none; border-radius: var(--radius-sm); font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.2s, transform 0.1s; }
    .login-btn:hover { opacity: 0.88; }
    .login-btn:active { transform: scale(0.98); }
    .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 0.75rem; min-height: 18px; }

    /* ===== DASHBOARD ===== */
    #dashboard { display: none; }
    .top-bar { background: #1a1d23; color: white; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
    .top-bar .brand { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
    .top-bar .brand span { opacity: 0.5; font-weight: 400; font-size: 13px; margin-right: 8px; }
    .logout-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 7px 16px; border-radius: var(--radius-sm); cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 13px; font-weight: 600; transition: background 0.2s; }
    .logout-btn:hover { background: rgba(255,255,255,0.18); }

    /* ===== PAGE & CARDS ===== */
    .page { max-width: 680px; margin: 0 auto; padding: 24px 16px 60px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }

    /* ===== FORM ELEMENTS ===== */
    .f-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .f-input, .f-select {
      width: 100%; padding: 10px 13px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; font-family: 'Cairo', sans-serif;
      color: var(--text); background: #f9fafb; transition: border-color 0.2s;
    }
    .f-input:focus, .f-select:focus { outline: none; border-color: var(--accent); background: white; }
    .f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .f-full { margin-bottom: 12px; }
    .submit-btn { width: 100%; padding: 12px; background: #1a1d23; color: white; border: none; border-radius: var(--radius-sm); font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.1s; margin-top: 4px; }
    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.98); }
    .reset-link { display: block; text-align: left; font-size: 12px; color: var(--muted); cursor: pointer; background: none; border: none; font-family: 'Cairo', sans-serif; text-decoration: underline; margin-bottom: 16px; }

    /* ===== SIZES SECTION ===== */
    #sizesContainer { margin-bottom: 4px; }
    .sizes-label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }

    /* default: select + price + delete-btn */
    .size-row {
      display: grid;
      grid-template-columns: 1fr 90px 36px;
      gap: 8px;
      margin-bottom: 8px;
      align-items: center;
    }
    /* when custom input is shown: select + custom-input + price + delete-btn */
    .size-row.has-custom {
      grid-template-columns: 1fr 1fr 90px 36px;
    }

    .del-size {
      color: var(--danger); border: 1.5px solid #fecaca; background: #fff5f5;
      border-radius: var(--radius-sm); width: 36px; height: 40px;
      font-weight: bold; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .del-size:hover { background: #fee2e2; }
    .add-size-link {
      color: var(--info-text); font-size: 12px; cursor: pointer; font-weight: 600;
      margin-top: 6px; display: inline-flex; align-items: center; gap: 4px;
      border: none; background: none; font-family: 'Cairo', sans-serif; padding: 4px 0;
    }
    .add-size-link:hover { text-decoration: underline; }

    /* ===== MENU LIST ===== */
    .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; padding: 6px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
    .item-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
    .item-row:last-child { border-bottom: none; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .item-actions { display: flex; gap: 10px; margin-top: 4px; }
    .item-del { font-size: 11px; color: var(--danger); background: none; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; text-decoration: underline; }
    .item-edit { font-size: 11px; color: var(--info-text); background: none; border: none; cursor: pointer; font-family: 'Cairo', sans-serif; text-decoration: underline; }
    .prices { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .price-group { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
    .price-tag { font-size: 10px; font-weight: 700; color: var(--muted); min-width: 80px; text-align: left; }
    .stepper { display: flex; align-items: center; gap: 4px; background: #f9fafb; border: 1.5px solid var(--border); border-radius: 30px; padding: 2px 6px; }
    .s-btn { width: 24px; height: 24px; border-radius: 50%; border: none; cursor: pointer; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .s-minus { background: #fee2e2; color: #dc2626; }
    .s-plus  { background: #dcfce7; color: #16a34a; }
    .s-input { width: 40px; text-align: center; border: none; background: transparent; font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700; }
    .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 24px 0; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a1d23; color: white; padding: 12px 24px; border-radius: 30px;
      font-size: 13px; font-weight: 600; font-family: 'Cairo', sans-serif;
      transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ====== LOGIN ====== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">IB</div>
    <h2>Ice N Beans</h2>
    <p class="login-subtitle">لوحة تحكم الإدارة</p>
    <div class="field">
      <label>اسم المستخدم</label>
      <input type="text" id="usr" placeholder="admin" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="pwd" placeholder="••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="login-btn" onclick="login()">دخول</button>
    <p class="login-error" id="login-err"></p>
  </div>
</div>

<!-- ====== DASHBOARD ====== -->
<div id="dashboard">
  <div class="top-bar">
    <div class="brand">Ice N Beans <span>Admin</span></div>
    <button class="logout-btn" onclick="logout()">خروج</button>
  </div>

  <div class="page">

    <!-- ADD / EDIT FORM -->
    <div class="card">
      <div class="card-title" id="formTitle">إضافة صنف جديد</div>
      <input type="hidden" id="editKey" value="">

      <div class="f-row">
        <div>
          <label class="f-label">الاسم بالعربي</label>
          <input class="f-input" type="text" id="nameAr" placeholder="مثال: كابتشينو">
        </div>
        <div>
          <label class="f-label">الاسم بالانجليزي</label>
          <input class="f-input" type="text" id="nameEn" placeholder="مثال: CAPPUCCINO">
        </div>
      </div>

      <div class="f-row">
        <div>
          <label class="f-label">القسم</label>
          <select class="f-select" id="catSelect" onchange="onCatChange()">
            <option value="">— اختر قسم —</option>
          </select>
        </div>
        <div id="newCatWrap" style="display:none">
          <label class="f-label">اسم القسم الجديد (Ar / En)</label>
          <input class="f-input" type="text" id="newCatInput" placeholder="عربي / English">
        </div>
      </div>

      <div id="sizesContainer">
        <label class="sizes-label">الأحجام والأسعار</label>
      </div>
      <button class="add-size-link" onclick="addSizeRow()">+ إضافة حجم آخر</button>

      <button class="submit-btn" style="margin-top:20px" onclick="saveItem()" id="saveBtn">إضافة للمنيو</button>
      <button class="reset-link" style="margin-top:10px; display:none" id="cancelEdit" onclick="resetForm()">إلغاء التعديل</button>
    </div>

    <!-- CURRENT MENU -->
    <div class="card">
      <div class="card-title">المنيو الحالية</div>
      <div id="itemsList"><div class="empty">جارٍ تحميل المنيو...</div></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  // ============================================================
  //  Firebase config
  // ============================================================
  const firebaseConfig = {
    apiKey: "AIzaSyDndtpI55_IqfqUEUQZ4isyDPN8B5ncTi4",
    databaseURL: "https://icenbeans-c092b-default-rtdb.firebaseio.com",
    projectId: "icenbeans-c092b"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ============================================================
  //  Standard sizes dictionary  (Arabic / English)
  // ============================================================
  const STANDARD_SIZES = [
    { ar: 'صغير',         en: 'Small',  value: 'صغير / Small'         },
    { ar: 'وسط',          en: 'Medium', value: 'وسط / Medium'          },
    { ar: 'كبير',         en: 'Large',  value: 'كبير / Large'          },
    { ar: 'إكسترا لارج',  en: 'XL',    value: 'إكسترا لارج / XL'     },
  ];

  function buildSizeOptions(selectedValue = '') {
    let opts = `<option value="">— اختر حجم —</option>`;
    STANDARD_SIZES.forEach(s => {
      const sel = selectedValue === s.value ? 'selected' : '';
      opts += `<option value="${s.value}" ${sel}>${s.ar} / ${s.en}</option>`;
    });
    const customSel = (selectedValue && !STANDARD_SIZES.some(s => s.value === selectedValue)) ? 'selected' : '';
    opts += `<option value="__custom__" ${customSel}>✏️ حجم مخصص...</option>`;
    return opts;
  }

  // ============================================================
  //  Auth
  // ============================================================
  function login() {
    const u = document.getElementById('usr').value.trim();
    const p = document.getElementById('pwd').value;
    if (u === 'admin' && p === 'icenbean2026') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      addSizeRow();
      startListen();
    } else {
      document.getElementById('login-err').textContent = 'خطأ في البيانات';
    }
  }

  function logout() { location.reload(); }

  // ============================================================
  //  Firebase listener
  // ============================================================
  function startListen() {
    db.ref('menu').on('value', snap => {
      const data = snap.val() || {};
      renderItems(data);
      updateCatSelect(data);
    });
  }

  // ============================================================
  //  Category select
  // ============================================================
  function updateCatSelect(data) {
    const cats = new Set();
    Object.values(data).forEach(i => {
      if (i.categoryAr && i.categoryEn) cats.add(i.categoryAr + ' / ' + i.categoryEn);
      else if (i.category) cats.add(i.category);
    });
    const sel = document.getElementById('catSelect');
    const cur = sel.value;
    sel.innerHTML = '<option value="">— اختر قسم —</option>';
    cats.forEach(c => { sel.innerHTML += `<option value="${c}">${c}</option>`; });
    sel.innerHTML += '<option value="__new__">+ قسم جديد</option>';
    if (cur) sel.value = cur;
  }

  function onCatChange() {
    document.getElementById('newCatWrap').style.display =
      document.getElementById('catSelect').value === '__new__' ? 'block' : 'none';
  }

  // ============================================================
  //  Size rows
  // ============================================================
  function addSizeRow(sizeValue = '', price = '') {
    const isCustom = sizeValue && !STANDARD_SIZES.some(s => s.value === sizeValue);
    const row = document.createElement('div');
    row.className = 'size-row' + (isCustom ? ' has-custom' : '');

    row.innerHTML = `
      <select class="f-select sz-select" onchange="onSizeSelectChange(this)">
        ${buildSizeOptions(isCustom ? '__custom__' : sizeValue)}
      </select>
      ${isCustom ? `<input class="f-input sz-custom" type="text" placeholder="مثال: ميدم / Medium" value="${sizeValue}">` : ''}
      <input class="f-input sz-price" type="number" placeholder="السعر" value="${price !== '' ? price : ''}">
      <button class="del-size" onclick="this.parentElement.remove()" title="حذف">×</button>
    `;
    document.getElementById('sizesContainer').appendChild(row);
  }

  function onSizeSelectChange(sel) {
    const row = sel.parentElement;
    const existing = row.querySelector('.sz-custom');

    if (sel.value === '__custom__') {
      if (!existing) {
        const inp = document.createElement('input');
        inp.className = 'f-input sz-custom';
        inp.type = 'text';
        inp.placeholder = 'مثال: ميدم / Medium';
        row.insertBefore(inp, row.querySelector('.sz-price'));
        row.classList.add('has-custom');
      }
    } else {
      if (existing) { existing.remove(); row.classList.remove('has-custom'); }
    }
  }

  // ============================================================
  //  Save item (add or update)
  // ============================================================
  function saveItem() {
    const nameAr  = document.getElementById('nameAr').value.trim();
    const nameEn  = document.getElementById('nameEn').value.trim().toUpperCase();
    const editKey = document.getElementById('editKey').value;

    let category = document.getElementById('catSelect').value;
    if (category === '__new__') category = document.getElementById('newCatInput').value.trim();

    const catParts  = category.split(' / ');
    const categoryAr = catParts[0] || '';
    const categoryEn = catParts[1] || catParts[0] || '';

    const sizes = [];
    document.querySelectorAll('#sizesContainer .size-row').forEach(row => {
      const sel    = row.querySelector('.sz-select');
      const custom = row.querySelector('.sz-custom');
      const n = sel.value === '__custom__'
        ? (custom ? custom.value.trim() : '')
        : sel.value;
      const p = parseInt(row.querySelector('.sz-price').value);
      if (n && !isNaN(p)) sizes.push({ name: n, price: p });
    });

    if (!nameAr || !categoryAr || sizes.length === 0) {
      alert('برجاء ملء جميع البيانات (الاسم، القسم، وحجم واحد على الأقل).');
      return;
    }

    const itemData = { nameAr, nameEn, categoryAr, categoryEn, sizes };

    if (editKey) {
      db.ref('menu/' + editKey).update(itemData).then(() => { resetForm(); showToast('✅ تم تحديث الصنف'); });
    } else {
      db.ref('menu').push(itemData).then(() => { resetForm(); showToast('✅ تمت الإضافة'); });
    }
  }

  // ============================================================
  //  Reset form
  // ============================================================
  function resetForm() {
    document.getElementById('nameAr').value = '';
    document.getElementById('nameEn').value = '';
    document.getElementById('catSelect').value = '';
    document.getElementById('editKey').value = '';
    document.getElementById('newCatInput').value = '';
    document.getElementById('newCatWrap').style.display = 'none';
    document.getElementById('formTitle').textContent = 'إضافة صنف جديد';
    document.getElementById('saveBtn').textContent = 'إضافة للمنيو';
    document.getElementById('cancelEdit').style.display = 'none';
    document.getElementById('sizesContainer').innerHTML = '<label class="sizes-label">الأحجام والأسعار</label>';
    addSizeRow();
  }

  // ============================================================
  //  Render menu list
  // ============================================================
  function renderItems(data) {
    const cont = document.getElementById('itemsList');
    cont.innerHTML = '';

    if (!data || Object.keys(data).length === 0) {
      cont.innerHTML = '<div class="empty">لا توجد أصناف بعد</div>';
      return;
    }

    const groups = {};
    Object.keys(data).forEach(key => {
      const item = data[key];
      const cat = (item.categoryAr || item.category || 'بدون قسم') + ' / ' + (item.categoryEn || '');
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push({ ...item, _key: key });
    });

    for (let cat in groups) {
      cont.innerHTML += `<div class="section-label">${cat}</div>`;
      groups[cat].forEach(item => {
        const itemSizes = item.sizes && item.sizes.length ? item.sizes : [
          { name: 'صغير / Small', price: item.small },
          { name: 'كبير / Large', price: item.large }
        ];

        let sizesHtml = '';
        itemSizes.forEach((s, si) => {
          if (s.price != null && s.price >= 0) {
            sizesHtml += `
              <div class="price-group">
                <span class="price-tag">${s.name}</span>
                <div class="stepper">
                  <button class="s-btn s-minus" onclick="updateStep('${item._key}', ${si}, -5)">−</button>
                  <input class="s-input" value="${s.price}" readonly>
                  <button class="s-btn s-plus"  onclick="updateStep('${item._key}', ${si}, 5)">+</button>
                </div>
              </div>`;
          }
        });

        cont.innerHTML += `
          <div class="item-row">
            <div class="item-info">
              <div class="item-name">${item.nameAr || item.name || ''}${item.nameEn ? ' / ' + item.nameEn : ''}</div>
              <div class="item-actions">
                <button class="item-edit" onclick="editItem('${item._key}')">تعديل</button>
                <button class="item-del"  onclick="deleteItem('${item._key}')">حذف</button>
              </div>
            </div>
            <div class="prices">${sizesHtml}</div>
          </div>`;
      });
    }
  }

  // ============================================================
  //  Price stepper
  // ============================================================
  function updateStep(key, sizeIdx, delta) {
    const ref = db.ref('menu/' + key);
    ref.once('value').then(snap => {
      const d = snap.val();
      if (d.sizes && d.sizes[sizeIdx] != null) {
        d.sizes[sizeIdx].price = Math.max(0, (parseInt(d.sizes[sizeIdx].price) || 0) + delta);
      } else {
        const field = sizeIdx === 0 ? 'small' : 'large';
        d[field] = Math.max(0, (parseInt(d[field]) || 0) + delta);
      }
      ref.set(d);
    });
  }

  // ============================================================
  //  Edit item
  // ============================================================
  function editItem(key) {
    db.ref('menu/' + key).once('value').then(snap => {
      const item = snap.val();
      document.getElementById('nameAr').value = item.nameAr || '';
      document.getElementById('nameEn').value = item.nameEn || item.name || '';

      const catVal = (item.categoryAr && item.categoryEn)
        ? item.categoryAr + ' / ' + item.categoryEn
        : (item.category || '');
      document.getElementById('catSelect').value = catVal;

      document.getElementById('editKey').value = key;
      document.getElementById('formTitle').textContent = 'تعديل الصنف';
      document.getElementById('saveBtn').textContent = 'تحديث البيانات';
      document.getElementById('cancelEdit').style.display = 'block';

      document.getElementById('sizesContainer').innerHTML = '<label class="sizes-label">الأحجام والأسعار</label>';
      const itemSizes = item.sizes && item.sizes.length ? item.sizes : [
        { name: 'صغير / Small', price: item.small },
        { name: 'كبير / Large', price: item.large }
      ];
      itemSizes.forEach(s => addSizeRow(s.name, s.price));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  // ============================================================
  //  Delete item
  // ============================================================
  function deleteItem(key) {
    if (confirm('حذف نهائي؟ لا يمكن التراجع.')) {
      db.ref('menu/' + key).remove().then(() => showToast('🗑️ تم الحذف'));
    }
  }

  // ============================================================
  //  Toast notification
  // ============================================================
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
